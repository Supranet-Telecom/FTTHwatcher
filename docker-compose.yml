services:

  postgres:
    image: postgres:16-alpine
    container_name: anatel_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-anatel}
      POSTGRES_USER: ${POSTGRES_USER:-anatel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-anatel} -d ${POSTGRES_DB:-anatel}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - anatel_net

  redis:
    image: redis:7-alpine
    container_name: anatel_redis
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - anatel_net

  etl:
    build:
      context: ./etl
      dockerfile_inline: |
        FROM python:3.12-slim
        COPY --from=ghcr.io/astral-sh/uv:latest /uv /uvx /bin/
        WORKDIR /app
        ENV UV_COMPILE_BYTECODE=1
        ENV UV_LINK_MODE=copy
        ENV UV_PROJECT_ENVIRONMENT=/venv
        COPY pyproject.toml ./
        RUN uv sync --no-dev --no-install-project
        CMD ["/venv/bin/python", "main.py"]
    container_name: anatel_etl
    restart: no
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-anatel}
      POSTGRES_USER: ${POSTGRES_USER:-anatel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      RAW_DATA_DIR: /data/raw/acessos_banda_larga_fixa
      DOWNLOAD_DATA: ${DOWNLOAD_DATA:-true}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      TZ: America/Sao_Paulo
    volumes:
      - ./raw:/data/raw
      - ./etl:/app:ro
    networks:
      - anatel_net

  backend:
    build:
      context: ./backend
      dockerfile_inline: |
        FROM python:3.12-slim
        COPY --from=ghcr.io/astral-sh/uv:latest /uv /uvx /bin/
        WORKDIR /app
        ENV UV_COMPILE_BYTECODE=1
        ENV UV_LINK_MODE=copy
        ENV UV_PROJECT_ENVIRONMENT=/venv
        COPY pyproject.toml ./
        RUN uv sync --no-dev --no-install-project
        CMD ["/venv/bin/python", "manage.py", "runserver", "0.0.0.0:8000"]
    container_name: anatel_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-anatel}
      POSTGRES_USER: ${POSTGRES_USER:-anatel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      DJANGO_DEBUG: "true"
      TZ: America/Sao_Paulo
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app:ro
    networks:
      - anatel_net

  frontend:
    build:
      context: ./app
      dockerfile_inline: |
        FROM oven/bun:1-alpine
        WORKDIR /app
        COPY package.json ./
        RUN bun install
        CMD ["sh", "-c", "bun install && bun run dev"]
    container_name: anatel_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:3000"
    volumes:
      - ./app:/app
      - /app/node_modules
      - /app/.nuxt
    networks:
      - anatel_net

volumes:
  postgres_data:
    driver: local

networks:
  anatel_net:
    driver: bridge
